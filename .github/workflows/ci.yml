name: Simple-Arch-Build-Fixed
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: archlinux:latest
      options: --privileged  # Một số lệnh hệ thống của Arch cần quyền này trong container

    steps:
      - name: Update System & Fix Keyring
        run: |
          # Sửa lỗi keyring cũ trong image để pacman hoạt động
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install Build Dependencies
        run: |
          pacman-key --init && pacman-key --populate archlinux
          pacman -Syu --noconfirm \
            git base-devel cmake boost ffmpeg \
            libevdev libpulse libdrm libx11 libxrandr libva \
            nlohmann-json openssl avahi libvdpau miniupnpc curl \
            python python-pip python-setuptools python-jinja \
            pipewire  # <--- Thêm ông này vào

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply Color Fix (BT.601 to BT.709)
        run: |
          # Chỉ chạy sau khi đã Checkout
          # Tìm và thay thế logic ép màu trong src/video.cpp
          sed -i 's/colorspace.colorspace == colorspace_e::rec601/colorspace.colorspace == colorspace_e::rec709/g' src/video.cpp
          echo "Applied BT.709 hardcode fix to src/video.cpp"

      - name: Build Sunshine
        run: |
          mkdir build && cd build
          # Thêm flag tắt CUDA để tránh lỗi
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DSUNSHINE_ENABLE_CUDA=OFF \
                -DSUNSHINE_ENABLE_DRM_AMDGPU=ON \
                -DSUNSHINE_ENABLE_VAAPI=ON \
                ..
          make -j$(nproc)

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-cachyos-fixed
          path: build/sunshine
